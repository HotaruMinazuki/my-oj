# ── Upstream ─────────────────────────────────────────────────────────────────
# In docker-compose: api-server resolves via the oj-net bridge network.
# On bare-metal: change the server address to 127.0.0.1:8080.
upstream oj_api {
    server api-server:8080;
    keepalive 64;               # keep 64 idle connections warm
}

# ── Server block ──────────────────────────────────────────────────────────────
server {
    listen      80;
    server_name _;              # replace with your domain in production

    # Security baseline
    server_tokens          off;
    client_max_body_size   64m;  # allow large testcase uploads

    # ── WebSocket — /ws/* ─────────────────────────────────────────────────────
    # Route: GET /ws/ranking/:contest_id  (see internal/api/server.go)
    # The browser's native WebSocket API cannot set custom headers, so this
    # block must forward the Upgrade handshake as-is.
    location /ws/ {
        proxy_pass         http://oj_api;
        proxy_http_version 1.1;

        # Required WebSocket upgrade headers
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Standard proxy identity headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived; bump timeouts accordingly.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Disable response buffering — streaming must flow through immediately.
        proxy_buffering    off;
    }

    # ── REST API — /api/* ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://oj_api;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Connection reuse — avoids per-request TCP teardown
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Static files / debug board ────────────────────────────────────────────
    # Mount public/ into the container at /usr/share/nginx/html (see nginx
    # service in docker-compose.yml).  Single-page-app fallback is not needed
    # here; files are served as-is.
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
