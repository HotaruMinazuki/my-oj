networks:
  oj-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       oj
      POSTGRES_USER:     oj
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - oj-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oj -d oj"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel notice
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - oj-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - oj-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout:  5s
      retries:  5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - oj-net
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./scripts/minio-init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"

  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      OJ_ENV: production
    command:
      - "-addr=:8080"
      - "-dsn=postgres://oj:${POSTGRES_PASSWORD}@postgres:5432/oj?sslmode=disable"
      - "-redis-addr=redis:6379"
      - "-minio-addr=minio:9000"
      - "-minio-key=${MINIO_ROOT_USER}"
      - "-minio-secret=${MINIO_ROOT_PASSWORD}"
      - "-jwt-key=${JWT_SECRET}"
      - "-log-level=info"
      # 找回密码邮件: 未配置 SMTP 时验证码仅写入容器日志; 配置后真正发送。
      # 163 邮箱示例 (-smtp-pass 填“客户端授权码”而非登录密码), 取消注释并替换:
      # - "-smtp-host=smtp.163.com"
      # - "-smtp-port=465"
      # - "-smtp-user=youraccount@163.com"
      # - "-smtp-pass=your-authorization-code"
      # - "-smtp-from=youraccount@163.com"
      # - "-app-name=OJ"
    networks:
      - oj-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/contests?size=1 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      api-server:
        condition: service_healthy
    ports:
      - "8088:80"
    networks:
      - oj-net

  judger-node:
    build:
      context: .
      dockerfile: Dockerfile.judger
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    privileged: true
    # nsjail 在宿主 cgroup 根下创建 NSJAIL.<pid> 并把进程 attach 进去;
    # 默认的私有 cgroup namespace 下 attach 会被内核以 ENOENT 拒绝
    # (目标 cgroup 在本容器 namespace 根之外), 必须用宿主 cgroup ns。
    cgroup: host
    security_opt:
      - seccomp:unconfined
    command:
      - "-redis=redis:6379"
      - "-minio-addr=minio:9000"
      - "-minio-key=${MINIO_ROOT_USER}"
      - "-minio-secret=${MINIO_ROOT_PASSWORD}"
      - "-workdir=/tmp/oj-judge"
      - "-workers=2"
      - "-nsjail=/usr/local/bin/nsjail"
      - "-seccomp=/configs/seccomp/default.bpf"
      - "-langs=/configs/languages.yaml"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    networks:
      - oj-net
    deploy:
      replicas: 1