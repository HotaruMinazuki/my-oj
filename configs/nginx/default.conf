# ── Upstream ─────────────────────────────────────────────────────────────────
upstream oj_api {
    server api-server:8080;
    keepalive 64;
}

# ── Server block ──────────────────────────────────────────────────────────────
server {
    listen      80;
    server_name _;

    server_tokens         off;
    client_max_body_size  64m;   # allow large testcase uploads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── WebSocket — /ws/* ─────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://oj_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
        proxy_buffering    off;
    }

    # ── REST API — /api/* ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://oj_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Vue SPA — 所有其他路径 ─────────────────────────────────────────────────
    # index.html 一律不缓存：它是 chunk 清单，浏览器缓存旧版会在重新部署后
    # 让懒加载路由取到已删除的旧 chunk（404），表现为页面/菜单"点不开"，
    # 直到用户强制刷新。
    location = /index.html {
        root  /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # 文件名带内容 hash 的静态资源，内容变了名字必变，可以永久缓存。
    location /assets/ {
        root  /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # try_files 先找静态文件，找不到则返回 index.html（Vue Router history 模式）
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
