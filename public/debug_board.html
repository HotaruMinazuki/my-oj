<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>OJ Debug Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cascadia Code','Fira Mono',monospace}
body{background:#0d1117;color:#e6edf3;padding:18px;font-size:13px}
h1{color:#58a6ff;font-size:1.1rem;margin-bottom:14px;letter-spacing:.5px}
.bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.bar label{color:#8b949e;font-size:.8rem}
input{background:#161b22;border:1px solid #30363d;color:#e6edf3;
      padding:5px 9px;border-radius:5px;width:90px;font-family:inherit}
button{background:#1f6feb;border:none;color:#fff;padding:5px 13px;
       border-radius:5px;cursor:pointer;font-family:inherit}
button:hover{background:#388bfd}
button.red{background:#da3633}
button.red:hover{background:#f85149}
#dot{width:9px;height:9px;border-radius:50%;background:#30363d;margin-left:4px}
#dot.on{background:#3fb950} #dot.err{background:#f85149}
#statusTxt{color:#8b949e;font-size:.8rem}
.panels{display:grid;grid-template-columns:340px 1fr;gap:12px;height:calc(100vh - 100px)}
.panel{background:#161b22;border:1px solid #21262d;border-radius:8px;overflow:hidden;
       display:flex;flex-direction:column}
.panel h2{background:#1c2128;color:#8b949e;font-size:.75rem;letter-spacing:.8px;
          text-transform:uppercase;padding:7px 12px;border-bottom:1px solid #21262d}
/* Scoreboard */
table{width:100%;border-collapse:collapse;font-size:.78rem}
thead th{background:#0d1117;color:#8b949e;padding:5px 8px;text-align:left;
         position:sticky;top:0;border-bottom:1px solid #21262d}
tbody tr{border-bottom:1px solid #161b22;transition:background .3s}
tbody td{padding:4px 8px}
tbody tr.flash{background:#1a3a2a}
.rank{color:#8b949e;width:28px} .uid{color:#58a6ff} .solved{color:#3fb950;text-align:center}
.penalty{color:#d29922;text-align:right} .status{color:#8b949e;font-size:.72rem}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:.68rem}
.badge.ac{background:#1a3a2a;color:#3fb950}
.badge.wa{background:#3a1a1a;color:#f85149}
.badge.tle{background:#3a2a0a;color:#d29922}
.badge.fb{background:#2a1a3a;color:#bc8cff}
/* Log */
#log{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.ev{display:flex;gap:6px;line-height:1.5;font-size:.73rem;padding:2px 0;
    border-bottom:1px solid #1c2128}
.ev .ts{color:#484f58;white-space:nowrap;flex-shrink:0}
.ev .tag{border-radius:3px;padding:0 5px;font-size:.68rem;white-space:nowrap;flex-shrink:0}
.ev .body{color:#c9d1d9;word-break:break-all}
.tag.snapshot{background:#0d419d;color:#79c0ff}
.tag.submission{background:#1a3a1a;color:#56d364}
.tag.firstblood{background:#2d2d00;color:#e3b341}
.tag.unfreeze{background:#2d1150;color:#d2a8ff}
.tag.err{background:#4a1515;color:#ffa198}
.tag.info{background:#1c2128;color:#8b949e}
#board-wrap{flex:1;overflow-y:auto}
</style>
</head>
<body>
<h1>⚡ OJ Debug Board — Real-time Ranking Monitor</h1>
<div class="bar">
  <label>Contest ID</label>
  <input id="cid" type="number" value="1" min="1">
  <button id="btn" onclick="toggle()">Connect</button>
  <div id="dot"></div>
  <span id="statusTxt">Disconnected</span>
  <button onclick="clearLog()" style="background:#21262d;margin-left:8px">Clear log</button>
</div>

<div class="panels">
  <!-- Scoreboard -->
  <div class="panel">
    <h2>Live Scoreboard</h2>
    <div id="board-wrap">
      <table>
        <thead><tr>
          <th class="rank">#</th>
          <th class="uid">User</th>
          <th class="solved">✓</th>
          <th class="penalty">Pen.</th>
          <th class="status">Last</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Event log -->
  <div class="panel">
    <h2>Event Log &nbsp;<span id="evCount" style="color:#484f58">0 events</span></h2>
    <div id="log"></div>
  </div>
</div>

<script>
/* ── State ────────────────────────────────────────────────────────────────── */
let ws = null, evCount = 0;
const board = {};   // userID (string) → {rank, solved, penalty, status}

/* ── WebSocket lifecycle ─────────────────────────────────────────────────── */
function toggle() {
  if (ws) { ws.close(); return; }
  const id = document.getElementById('cid').value.trim();
  if (!id || id <= 0) { logEv('err', 'ERR', 'Enter a valid Contest ID'); return; }
  connect(id);
}

function connect(contestID) {
  // Route: GET /ws/ranking/:contest_id  (see internal/api/server.go line ~80)
  const url = `ws://${location.hostname || 'localhost'}:8080/ws/ranking/${contestID}`;
  setStatus('connecting', `Connecting to contest ${contestID}…`);
  logEv('info', 'INFO', `Connecting → ${url}`);

  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus('on', `Connected · contest ${contestID}`);
    document.getElementById('btn').textContent = 'Disconnect';
    document.getElementById('btn').classList.add('red');
    logEv('info', 'INFO', 'WebSocket handshake OK');
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { logEv('err', 'ERR', 'Bad JSON: ' + data.slice(0, 80)); return; }
    dispatch(msg);
  };

  ws.onerror = () => {
    setStatus('err', 'Connection error');
    logEv('err', 'ERR', 'WebSocket error — is api-server running on :8080?');
  };

  ws.onclose = ({ code, reason }) => {
    setStatus('off', `Disconnected (${code})`);
    document.getElementById('btn').textContent = 'Connect';
    document.getElementById('btn').classList.remove('red');
    logEv('info', 'INFO', `Closed: code=${code} reason=${reason || 'none'}`);
    ws = null;
  };
}

/* ── Message dispatch ────────────────────────────────────────────────────── */
function dispatch(msg) {
  const { type, data } = msg;
  const preview = JSON.stringify(data).slice(0, 120);

  switch (type) {
    case 'snapshot':
      logEv('snapshot', 'SNAPSHOT', `${(data.rows||[]).length} rows · updated_at ${data.updated_at||''}`);
      applySnapshot(data);
      break;
    case 'submission':
      logEv('submission', 'DELTA', `user=${data.user_id} prob=${data.problem_id} ${data.old_status}→${data.new_status} rank ${data.old_rank}→${data.new_rank}`);
      applyDelta(data, type);
      break;
    case 'firstblood':
      logEv('firstblood', '🩸 FIRST BLOOD', `user=${data.user_id} prob=${data.problem_id}`);
      applyDelta(data, type);
      break;
    case 'unfreeze':
      logEv('unfreeze', 'UNFREEZE', `user=${data.user_id} ${data.old_status}→${data.new_status} rank ${data.old_rank}→${data.new_rank}`);
      applyDelta(data, type);
      break;
    default:
      logEv('err', 'UNKNOWN', preview);
  }
}

/* ── Scoreboard logic ────────────────────────────────────────────────────── */
function applySnapshot(data) {
  Object.keys(board).forEach(k => delete board[k]);
  for (const row of (data.rows || [])) {
    board[row.user_id] = {
      rank: row.rank, solved: row.total_score,
      penalty: row.total_penalty, status: '',
    };
  }
  renderBoard();
}

function applyDelta(d, type) {
  const uid = d.user_id;
  board[uid] = board[uid] || { rank: 0, solved: 0, penalty: 0, status: '' };
  if (d.new_rank    != null) board[uid].rank    = d.new_rank;
  if (d.new_solved  != null) board[uid].solved  = d.new_solved;
  if (d.new_penalty != null) board[uid].penalty = d.new_penalty;
  if (d.new_status)          board[uid].status  = d.new_status;
  if (type === 'firstblood') board[uid].fb = true;
  renderBoard();
  flash('row-' + uid);
}

function renderBoard() {
  const sorted = Object.entries(board)
    .map(([uid, r]) => ({ uid, ...r }))
    .sort((a, b) => (a.rank || 9999) - (b.rank || 9999) || a.uid - b.uid);

  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  for (const r of sorted) {
    const tr = document.createElement('tr');
    tr.id = 'row-' + r.uid;
    const statusBadge = r.status
      ? `<span class="badge ${statusClass(r.status)}">${r.status}</span>` : '';
    const fbMark = r.fb ? ' <span class="badge fb">🩸</span>' : '';
    tr.innerHTML =
      `<td class="rank">${r.rank || '?'}</td>` +
      `<td class="uid">${r.uid}${fbMark}</td>` +
      `<td class="solved">${r.solved}</td>` +
      `<td class="penalty">${r.penalty}m</td>` +
      `<td class="status">${statusBadge}</td>`;
    tb.appendChild(tr);
  }
}

function statusClass(s) {
  if (!s) return '';
  s = s.toLowerCase();
  if (s === 'ac' || s === 'accepted') return 'ac';
  if (s === 'wa' || s.includes('wrong')) return 'wa';
  if (s.includes('time') || s === 'tle') return 'tle';
  return '';
}

function flash(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 1200);
}

/* ── Log ─────────────────────────────────────────────────────────────────── */
function logEv(type, tag, body) {
  evCount++;
  document.getElementById('evCount').textContent = evCount + ' events';
  const log = document.getElementById('log');
  const ts  = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const div = document.createElement('div');
  div.className = 'ev';
  div.innerHTML =
    `<span class="ts">${ts}</span>` +
    `<span class="tag ${type}">${esc(tag)}</span>` +
    `<span class="body">${esc(body)}</span>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
  evCount = 0;
  document.getElementById('evCount').textContent = '0 events';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Status indicator ────────────────────────────────────────────────────── */
function setStatus(state, text) {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('statusTxt');
  dot.className = state === 'on' ? 'on' : state === 'err' ? 'err' : '';
  txt.textContent = text;
  txt.style.color = state === 'on' ? '#3fb950' : state === 'err' ? '#f85149' : '#8b949e';
}
</script>
</body>
</html>
