version: "3.9"

networks:
  oj-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       oj
      POSTGRES_USER:     oj
      POSTGRES_PASSWORD: oj_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks: [oj-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oj -d oj"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server --save 60 1 --loglevel notice
      --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks: [oj-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks: [oj-net]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── MinIO bucket initialisation ─────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    networks: [oj-net]
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./scripts/minio-init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"

  # ── API Server ──────────────────────────────────────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:   { condition: service_healthy }
      redis:      { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    environment:
      OJ_ENV: production
    command:
      - "-addr=:8080"
      - "-dsn=postgres://oj:oj_secret@postgres:5432/oj?sslmode=disable"
      - "-redis-addr=redis:6379"
      - "-minio-addr=minio:9000"
      - "-minio-key=minioadmin"
      - "-minio-secret=minioadmin"
      - "-jwt-key=change-me-in-production"
      - "-log-level=info"
    networks: [oj-net]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 && exit 0 || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3

  # ── Frontend (Vue3 + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      api-server: { condition: service_healthy }
    ports:
      - "8088:80"
    networks: [oj-net]

  # ── Judger Node ─────────────────────────────────────────────────────────────
  judger-node:
    build:
      context: .
      dockerfile: Dockerfile.judger
    restart: unless-stopped
    depends_on:
      redis:      { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    privileged: true
    security_opt:
      - seccomp:unconfined
    command:
      - "-redis=redis:6379"
      - "-minio-addr=minio:9000"
      - "-minio-key=minioadmin"
      - "-minio-secret=minioadmin"
      - "-workdir=/tmp/oj-judge"
      - "-workers=2"
      - "-nsjail=/usr/local/bin/nsjail"
      - "-seccomp=/configs/seccomp/default.bpf"
      - "-langs=/configs/languages.yaml"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    networks: [oj-net]
    deploy:
      replicas: 1
